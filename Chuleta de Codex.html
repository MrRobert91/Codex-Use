  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ex;align-items:center;gap:11px;flex-shrink:0;\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:var(--f5-orange);\"><\u002Fspan>\n      <span style=\"font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:.16em;text-transform:uppercase;\">Chuleta de Codex<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;height:8px;background:#ECE7E1;border-radius:999px;overflow:hidden;\">\n      <div id=\"ws-fill\" style=\"width:0%;height:100%;background:var(--f5-orange);border-radius:999px;transition:width .3s ease;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <span id=\"ws-count\" style=\"font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--f5-ink-2);flex-shrink:0;\">0 / 13<\u002Fspan>\n    <button class=\"ws-reset\" style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--f5-gray);background:none;border:none;cursor:pointer;flex-shrink:0;\">Reiniciar<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- Hero -->\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:64px 40px 20px;\">\n    <span style=\"font-family:var(--font-mono);font-weight:500;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--f5-orange);\">Chuleta · qué puedes hacer con Codex y cuándo<\u002Fspan>\n    <h1 style=\"font-family:var(--font-display);font-weight:800;font-size:60px;line-height:1.02;letter-spacing:-.03em;margin:16px 0 0;max-width:20ch;\">Cosas que puedes hacer con <span style=\"color:var(--f5-orange);\">Codex<\u002Fspan><\u002Fh1>\n    <p style=\"font-size:19px;line-height:1.55;color:var(--f5-ink-2);margin:22px 0 0;max-width:66ch;\">Funciones útiles ordenadas de lo más básico a lo más avanzado, con enlaces a la documentación oficial y un apunte de <b>cuándo usar cada una<\u002Fb>. Casi todo desde la extensión de VS Code; lo exclusivo de la App va marcado. Marca lo que ya hayas probado — se guarda solo.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px 26px;margin-top:26px;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:4px 11px;\">Extensión VS Code<\u002Fspan><span style=\"font-size:14px;color:var(--f5-ink-2);\">la mayoría de funciones<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:5px 12px;\">Codex App<\u002Fspan><span style=\"font-size:14px;color:var(--f5-ink-2);\">solo lo exclusivo de la app<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FASE 1 ============ -->\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:40px 40px 0;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-top:2px solid var(--f5-black);padding-top:16px;\">\n      <span style=\"font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--f5-orange);\">101<\u002Fspan>\n      <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;\">Primeros pasos<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:24px 40px 0;display:flex;flex-direction:column;gap:22px;\">\n\n    <!-- 1 -->\n    <article data-ch=\"1\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"1\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">01<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Instala e inicia sesión<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Descarga la <b>Codex App<\u002Fb> desde <a class=\"ws-link\" href=\"https://openai.com/codex\" target=\"_blank\" rel=\"noopener\">openai.com/codex<\u002Fa> e inicia sesión con tu cuenta de ChatGPT.<\u002Fli>\n            <li>En VS Code, abre el panel de extensiones, busca <b>“OpenAI Codex”<\u002Fb>, instálala y pulsa <b>Sign in with ChatGPT<\u002Fb>.<\u002Fli>\n            <li>Confirma que ves el icono de Codex en la barra lateral de VS Code y que la app abre tu proyecto.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> empieza por aquí. Usa la <b>extensión<\u002Fb> para el día a día en el editor y la <b>App<\u002Fb> para tareas en segundo plano o en la nube.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/ide\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/ide<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 2 -->\n    <article data-ch=\"2\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"2\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">02<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Conecta tu repositorio de GitHub<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:14px;color:var(--f5-gray);margin:0 0 10px;\">Elige un repo (uno tuyo o público) para probar el resto de funciones.<\u002Fp>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>En VS Code, abre la carpeta del repositorio clonado (<span style=\"font-family:var(--font-mono);\">File → Open Folder<\u002Fspan>).<\u002Fli>\n            <li>En la Codex App, abre <b data-comment-anchor=\"116eb3de5e-b\">Complementos (Plugins)<\u002Fb> → <b>GitHub<\u002Fb> y autoriza la Codex GitHub App (elige los repos). Para tareas en la nube y code review, configura además un entorno en <span style=\"font-family:var(--font-mono);\">chatgpt.com/codex<\u002Fspan> → Settings → Environments.<\u002Fli>\n            <li>Comprueba el acceso: pídele en un chat <i>“lista los repositorios a los que tienes acceso en GitHub”<\u002Fi> y verifica que aparece el tuyo.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> en cuanto quieras que Codex lea o escriba en un repo, y para code review o tareas en la nube vía <span style=\"font-family:var(--font-mono);\">@codex<\u002Fspan>.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/integrations/github\" target=\"_blank\" rel=\"noopener\" data-comment-anchor=\"71e89f5829-a\">developers.openai.com/codex/integrations/github<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 3 -->\n    <article data-ch=\"3\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"3\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">03<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\" data-comment-anchor=\"f3ea5632fe-h3\">Entiende la arquitectura del repo con un prompt completo<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.5;color:var(--f5-ink-2);margin:0 0 12px;\">Copia y pega este prompt (bien formado: objetivo, contexto, restricciones y definición de terminado) para que Codex te ponga al día como si entraras nuevo al equipo:<\u002Fp>\n          <div style=\"background:#020100;border-radius:14px;padding:18px 20px;font-family:var(--font-mono);font-size:12.5px;line-height:1.65;color:#E8E8E8;\">\n            <div><span style=\"color:#FFA37F;\">Objetivo:<\u002Fspan> explícame la arquitectura de este repositorio como si fuera un nuevo desarrollador del equipo.<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#FFA37F;\">Contexto:<\u002Fspan> revisa el árbol de carpetas, el README, los manifiestos de dependencias y los puntos de entrada.<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#FFA37F;\">Qué necesito:<\u002Fspan> propósito del proyecto, módulos principales y cómo se relacionan, flujo de datos, cómo se ejecuta y se testea en local, y las convenciones clave.<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#FFA37F;\">Restricciones:<\u002Fspan> solo lectura, no modifiques archivos; cita rutas concretas.<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#FFA37F;\">Terminado cuando:<\u002Fspan> pueda orientarme y localizar dónde tocar para una tarea típica.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> al entrar a un repo nuevo o retomar uno que no tocas hace meses, antes de cambiar nada.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/prompting\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/prompting<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 4 -->\n    <article data-ch=\"4\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"4\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">04<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\" data-comment-anchor=\"0c77460b44-h3\">Crea tu AGENTS.md (y uno anidado)<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>No lo escribas a mano: pídele a Codex que lo genere a partir del propio repo. Copia este prompt:<\u002Fli>\n          <\u002Fol>\n          <div style=\"background:#020100;border-radius:14px;padding:16px 18px;margin-top:12px;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;color:#E8E8E8;\">Analiza este repositorio y crea un <span style=\"color:#FFA37F;\">AGENTS.md<\u002Fspan> en la raíz: detecta las convenciones reales del código (estilo, nombres, estructura de carpetas, comandos de build/test/lint, gestor de paquetes) y conviértelas en reglas para mantenerlas. Añade una sección de buenas prácticas de ingeniería. Máximo 100 líneas.<\u002Fdiv>\n          <ol start=\"2\" style=\"margin:12px 0 0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Revísalo y ajústalo a lo que hacéis de verdad en el equipo.<\u002Fli>\n            <li>Pídele que cree además un <span style=\"font-family:var(--font-mono);\">AGENTS.md<\u002Fspan> anidado en un subdirectorio (p. ej. <span style=\"font-family:var(--font-mono);\">src/<\u002Fspan>) con reglas propias de esa carpeta.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;background:#FBFBFB;border:1.5px solid #ECE7E1;border-radius:14px;padding:16px 18px;\">\n            <div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--f5-gray);margin-bottom:8px;\">Ejemplo típico de AGENTS.md<\u002Fdiv>\n            <pre style=\"margin:0;font-family:var(--font-mono);font-size:12px;line-height:1.55;color:var(--f5-ink-2);white-space:pre-wrap;\">## Comandos\n- Build: npm run build · Test: npm test · Lint: npm run lint\n\n## Convenciones\n- TypeScript estricto; camelCase para variables, PascalCase para componentes.\n- Un módulo por carpeta; evita imports relativos profundos.\n\n## Buenas prácticas\n- Añade o actualiza tests con cada cambio y déjalos en verde.\n- Cambios pequeños y atómicos; mensajes de commit descriptivos.\n- No toques dist/ ni ficheros generados.<\u002Fpre>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> una vez por repo (y por subcarpeta con reglas propias). Es lo que más mejora la calidad de Codex a largo plazo.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/guides/agents-md\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/guides/agents-md<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n\n  <!-- ============ FASE 2 ============ -->\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:52px 40px 0;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-top:2px solid var(--f5-black);padding-top:16px;\">\n      <span style=\"font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--f5-orange);\">101 · 201<\u002Fspan>\n      <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;\">Flujo de desarrollo<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:24px 40px 0;display:flex;flex-direction:column;gap:22px;\">\n\n    <!-- 5 -->\n    <article data-ch=\"5\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"5\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">05<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Planifica una feature con Plan mode<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Elige una mejora sencilla y real (un endpoint, una validación, un pequeño componente).<\u002Fli>\n            <li>Activa <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">/plan<\u002Fspan> y pídele que proponga un plan paso a paso sin escribir código todavía.<\u002Fli>\n            <li>Revisa el plan, pide ajustes si hace falta y <b>acéptalo<\u002Fb>.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> para cambios de varios pasos o que tocan varios archivos. Sáltatelo en ediciones triviales.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/ide\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/ide<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 6 -->\n    <article data-ch=\"6\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"6\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">06<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Implementa: worktree, rama y PR<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Crea un <b>worktree<\u002Fb> nuevo para la feature (rama aparte, sin tocar tu checkout principal).<\u002Fli>\n            <li>Cambia los permisos a <b>Full Access<\u002Fb> solo para esta tarea y pídele que implemente el plan aceptado y ejecute los tests.<\u002Fli>\n            <li>Revisa el diff, y cuando esté verde: <b data-comment-anchor=\"02f85c3a8b-b\">pídele a Codex que haga el commit, el push y abra el PR a <span style=\"font-family:var(--font-mono);\">main<\u002Fspan><\u002Fb>.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> features que conviven con otro trabajo, o para lanzar varios agentes en paralelo sin pisarse el checkout.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/app/worktrees\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/app/worktrees<\u002Fa> · <a class=\"ws-link\" href=\"https://developers.openai.com/codex/agent-approvals-security\" target=\"_blank\" rel=\"noopener\">/agent-approvals-security<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 7 -->\n    <article data-ch=\"7\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"7\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">07<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Revisa tu PR con /review<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Sobre la rama del PR, ejecuta <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">/review<\u002Fspan> para una revisión antes de fusionar.<\u002Fli>\n            <li>Lee los hallazgos (correctitud, seguridad, tests que faltan) y pídele que corrija los que apliquen.<\u002Fli>\n            <li data-comment-anchor=\"529d0c9f0b-li\">Pídele al agente que aplique las correcciones y <b>actualice el PR<\u002Fb>; vuelve a pasar <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">/review<\u002Fspan> para confirmar.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> antes de pedir revisión humana o de fusionar; también sobre PRs ajenas para un primer pase rápido.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/app/review\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/app/review<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 8 -->\n    <article data-ch=\"8\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"8\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">08<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Trabaja en paralelo con subagentes<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:14px;color:var(--f5-gray);margin:0 0 10px;\">Abre otro hilo en la App mientras el anterior sigue corriendo.<\u002Fp>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>En la Codex App, abre una <b>nueva conversación en paralelo<\u002Fb> sobre el mismo repo.<\u002Fli>\n            <li>Pídele explícitamente una tarea paralelizable con subagentes, p. ej.: <i>“Usa subagentes para mapear el codebase: uno lista los módulos y sus dependencias, otro localiza dónde faltan tests. Reúne los resultados.”<\u002Fi><\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> tareas muy paralelizables (explorar el código, ejecutar un plan con ramas independientes). No para cambios pequeños: gastan más tokens.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/subagents\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/subagents<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n\n  <!-- ============ FASE 3 ============ -->\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:52px 40px 0;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-top:2px solid var(--f5-black);padding-top:16px;\">\n      <span style=\"font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--f5-orange);\">201 · 301<\u002Fspan>\n      <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;\">Configuración avanzada y automatización<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ws-col\" style=\"max-width:1080px;margin:0 auto;padding:24px 40px 0;display:flex;flex-direction:column;gap:22px;\">\n\n    <!-- 9 -->\n    <article data-ch=\"9\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"9\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">09<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Configura Codex y lanza una tarea en la nube<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>En <b>Settings<\u002Fb> (o en <span style=\"font-family:var(--font-mono);\">config.toml<\u002Fspan>) ajusta: <span style=\"font-family:var(--font-mono);\">personality<\u002Fspan>, <span style=\"font-family:var(--font-mono);\">model<\u002Fspan>, <span style=\"font-family:var(--font-mono);\">model_reasoning_effort<\u002Fspan> y activa la memoria (<span style=\"font-family:var(--font-mono);\">[features] memories = true<\u002Fspan>).<\u002Fli>\n            <li>Cambia los permisos por defecto con el preset que prefieras (Ask for approval / Approve for me / Full access) o <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">/permissions<\u002Fspan>.<\u002Fli>\n            <li>Lanza una tarea <b>en la nube<\u002Fb> (no en tu máquina) y, sin esperar, abre otra sesión para seguir trabajando.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color: var(--f5-orange); font-weight: 600;\">Cuándo usarlo:<\u002Fspan> tareas largas o pesadas que no quieres en tu máquina, o desde la app movil de codex.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/config-basic\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/config-basic<\u002Fa> · <a class=\"ws-link\" href=\"https://developers.openai.com/codex/cloud\" target=\"_blank\" rel=\"noopener\">/cloud<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 10 -->\n    <article data-ch=\"10\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"10\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">10<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Conecta un servidor MCP<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li data-comment-anchor=\"d9e69beafb-li\">En la extensión de VS Code: icono de <b>engranaje ⚙️ → MCP Settings → + Add servers<\u002Fb> (o <b>Open config.toml<\u002Fb> para editarlo a mano).<\u002Fli>\n            <li>Añade un servidor MCP bajo <span style=\"font-family:var(--font-mono);\">[mcp_servers.&lt;nombre&gt;]<\u002Fspan> (comando/URL y credenciales por variable de entorno).<\u002Fli>\n            <li>En un chat, pide una tarea que use una herramienta del MCP y verifica que Codex la invoca.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> cuando Codex necesita herramientas o datos externos (Linear, GitHub, tu base de datos, docs) más allá del repo.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\" data-comment-anchor=\"9e8336c03c-p\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/mcp\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/mcp<\u002Fa> · <a class=\"ws-link\" href=\"https://github.com/modelcontextprotocol/servers\" target=\"_blank\" rel=\"noopener\">lista de servidores MCP<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 11 -->\n    <article data-ch=\"11\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"11\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">11<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Captura la funcionalidad con el et=\"_blank\" rel=\"noopener\">developers.openai.com/codex/app/browser<\u002Fa> · <a class=\"ws-link\" href=\"https://developers.openai.com/codex/app/chrome-extension\" target=\"_blank\" rel=\"noopener\">/chrome-extension<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 12 -->\n    <article data-ch=\"12\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"12\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">12<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\">Instala una skill y crea la tuya<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--f5-black);border-radius:999px;padding:3px 10px;\">VS Code<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><\u002Fdiv>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>Instala una skill curada con <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">$skill-installer<\u002Fspan> (catálogo en <a class=\"ws-link\" href=\"https://github.com/openai/skills\" target=\"_blank\" rel=\"noopener\">github.com/openai/skills<\u002Fa>).<\u002Fli>\n            <li>Crea una skill propia con <span style=\"font-family:var(--font-mono);color:var(--f5-orange);\">$skill-creator<\u002Fspan> para una tarea repetitiva tuya; guárdala en <span style=\"font-family:var(--font-mono);\">.agents/skills<\u002Fspan>.<\u002Fli>\n            <li>Invoca ambas con <span style=\"font-family:var(--font-mono);\">$nombre-skill<\u002Fspan> en una tarea real del repo.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> para tareas repetitivas con pasos fijos. Instala una curada o crea la tuya y reutilízala en todo el equipo.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/skills\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/skills<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- 13 -->\n    <article data-ch=\"13\" style=\"position:relative;background:#fff;border:1.5px solid #ECE7E1;border-radius:20px;padding:28px 32px;box-shadow:0 10px 26px rgba(2,1,0,.05);\">\n      <button class=\"ws-check\" data-ch=\"13\" style=\"position:absolute;top:22px;right:24px;width:38px;height:38px;border-radius:50%;border:2px solid #D8D2CB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;\"><span style=\"font-size:19px;line-height:1;color:#CFC7BE;\">✓<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:flex-start;gap:18px;\">\n        <div style=\"font-family:var(--font-mono);font-weight:600;font-size:19px;color:var(--f5-orange);border:2px solid var(--f5-orange);border-radius:12px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">13<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;padding-right:44px;\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;\"><h3 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;\" data-comment-anchor=\"1af2840d09-h3\">Programa un resumen semanal de PRs<\u002Fh3><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:var(--f5-orange);color:#fff;border-radius:999px;padding:4px 11px;\">App<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:14px;color:var(--f5-gray);margin:0 0 10px;\">Crea una tarea programada que cada lunes a las 7:00 resuma todas las PRs mergeadas la última semana.<\u002Fp>\n          <ol style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:15px;line-height:1.5;color:var(--f5-ink-2);\">\n            <li>En la barra lateral de la Codex App, abre <b>Programadas<\u002Fb> (Automations) y pulsa crear.<\u002Fli>\n            <li>Elige <b>crear por chat<\u002Fb>, describe la tarea y fija el horario <b>semanal, lunes 07:00<\u002Fb> (o cron <span style=\"font-family:var(--font-mono);\">0 7 * * 1<\u002Fspan>).<\u002Fli>\n            <li>Usa un prompt como este:<\u002Fli>\n          <\u002Fol>\n          <div style=\"background:#020100;border-radius:14px;padding:16px 18px;margin-top:12px;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;color:#E8E8E8;\">Cada lunes, resume todas las pull requests <span style=\"color:#FFA37F;\">mergeadas en main durante los últimos 7 días<\u002Fspan>: título, autor, tipo de cambio e impacto. Agrúpalas por área y devuelve un resumen en Markdown listo para compartir. Si no hay PRs mergeadas, archívalo sin reportar.<\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:14px;line-height:1.5;color:var(--f5-black);background:#FFF7F3;border-radius:12px;padding:11px 14px;\"><span style=\"color:var(--f5-orange);font-weight:600;\">Cuándo usarlo:<\u002Fspan> trabajo recurrente y predecible (resúmenes, triaje, auditorías) que hoy haces a mano cada semana.<\u002Fdiv>\n          <p style=\"font-family:var(--font-mono);font-size:12.5px;margin:12px 0 0;\"><a class=\"ws-link\" href=\"https://developers.openai.com/codex/app/automations\" target=\"_blank\" rel=\"noopener\">developers.openai.com/codex/app/automations<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n\n  <div style=\"height:56px;\"><\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const KEY = 'ws_codex_done_v1';\n    const load = () => { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { return {}; } };\n    let state = load();\n    const root = this.el || document;\n    const cards = [...document.querySelectorAll('[data-ch]')].filter(c => c.tagName === 'ARTICLE');\n    const total = cards.length;\n\n    const apply = () => {\n      let n = 0;\n      cards.forEach(c => {\n        const id = c.getAttribute('data-ch');\n        const done = !!state[id];\n        if (done) n++;\n        c.style.borderColor = done ? 'var(--f5-orange)' : '#ECE7E1';\n        c.style.background = done ? '#FFF7F3' : '#fff';\n        const btn = c.querySelector('.ws-check');\n        if (btn) {\n          btn.style.background = done ? 'var(--f5-orange)' : '#fff';\n          btn.style.borderColor = done ? 'var(--f5-orange)' : '#D8D2CB';\n          const chk = btn.querySelector('span');\n          if (chk) chk.style.color = done ? '#fff' : '#CFC7BE';\n        }\n      });\n      const fill = document.getElementById('ws-fill');\n      if (fill) fill.style.width = (total ? Math.round(n / total * 100) : 0) + '%';\n      const cnt = document.getElementById('ws-count');\n      if (cnt) cnt.textContent = n + ' / ' + total;\n    };\n\n    document.addEventListener('click', (e) => {\n      const btn = e.target.closest && e.target.closest('.ws-check');\n      if (btn) {\n        const c = btn.closest('[data-ch]');\n        const id = c.getAttribute('data-ch');\n        state[id] = !state[id];\n        localStorage.setItem(KEY, JSON.stringify(state));\n        apply();\n        return;\n      }\n      const rst = e.target.closest && e.target.closest('.ws-reset');\n      if (rst) {\n        state = {};\n        localStorage.setItem(KEY, JSON.stringify(state));\n        apply();\n      }\n    });\n\n    apply();\n    setTimeout(apply, 300);\n  }\n}\n<\u002Fscript>\n<script>\naddEventListener('load', () => {\n  (async () => {\n    try { await document.fonts.ready; } catch (e) {}\n    const imgs = Array.from(document.images).filter((i) => !i.complete);\n    await Promise.race([\n      Promise.allSettled(imgs.map((i) => i.decode())),\n      new Promise((r) => setTimeout(r, 8000)),\n    ]);\n    setTimeout(() => window.print(), 500);\n  })();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
